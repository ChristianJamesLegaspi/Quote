<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Random Quote</title>
</head>
<body>
    <div class="mui-card">
        <img src="https://picsum.photos/600/300"
            id="img"
            class="mui-img">
        <div class="mui-content">

            <label class="form-label">Your Text</label>
            <textarea id="customText" rows="3"
                class="form-control mb-2">
            </textarea>
           
            <div class="d-flex gap-2 mb-2">
                <select name="" id="voiceSelect" class="form-select form-select-sm"></select>
                <button class="btn btn-outline-secondary btn-sm"
                        onclick="loadVoices()">
                    🔃 Voices
                </button>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary btn-sm" onclick="getQuote()">
                🎲Quote
            </button>

            <button class="btn btn-success btn-sm" onclick="speak()">🔊Speak</button>
            <button class="btn btn-warning btn-sm" onclick="pauseSpeech()">⏸️ Pause</button>
            <button class="btn btn-info btn-sm" onclick="resumeSpeech()">▶️Resume</button>
            <button class="btn btn-danger btn-sm" onclick="stopSpeech()">⛔ Stop</button>


            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
